<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graduación de Lucero Valentina</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #fff5f7; color: #444; }
        
        /* Pantalla de bienvenida (Sobre/Portada) */
        #pantalla-inicio {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            text-align: center;
            padding: 20px;
        }
        
        /* Contenido principal (Oculto al inicio) */
        #contenido-invitacion {
            display: none;
        }

        .hero { background: linear-gradient(135deg, #fce4ec, #f8bbd0); padding: 80px 20px; text-align: center; border-bottom-left-radius: 50px; border-bottom-right-radius: 50px; }
        .hero h1 { font-family: 'Dancing Script', cursive; color: #d81b60; font-size: 3.5em; margin: 0; }
        .section { padding: 40px 20px; text-align: center; max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn { display: inline-block; padding: 15px 30px; background: #d81b60; color: white; text-decoration: none; border-radius: 50px; font-weight: 600; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); }
        
        /* Estilo para el botón de abrir y de música */
        .btn-abrir {
            padding: 20px 40px;
            font-size: 1.5em;
            background: #d81b60;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-abrir:hover { transform: scale(1.05); background: #ad1457; }
        
        #btnMusica { 
            position: fixed; bottom: 20px; right: 20px; border-radius: 50%; border: none; 
            padding: 15px; background: #d81b60; color: white; cursor: pointer; z-index: 9999; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <h1 style="font-family: 'Dancing Script'; margin-bottom: 10px;">¡Estás invitad@!</h1>
        <p>Presiona el botón para abrir la invitación y escuchar la música</p>
        <button id="btnAbrir" class="btn-abrir">💌 Abrir Invitación</button>
    </div>

    <div id="contenido-invitacion">
        
        <audio id="musicaFondo" loop>
            <source src="Magnetic.mp3" type="audio/mpeg">
        </audio>

        <button id="btnMusica">🔊</button>

        <div class="hero">
            <h1>¡Graduación!</h1>
            <h2 style="font-family:'Dancing Script'; font-size:2em; margin-top: 10px;">Lucero Valentina Zúñiga Soto</h2>
        </div>

        <div class="section">
            <div class="card">
                <h2>Detalles</h2>
                <p><strong>Fecha:</strong> Lunes 6 de Julio, 2026</p>
                <p><strong>Lugar:</strong> Casa Familiar</p>
                <a href="https://maps.app.goo.gl/HLzEGWPw2VVo33xXA" class="btn">📍 Ver Ubicación</a>
            </div>
        </div>

        <div class="section">
            <a href="https://wa.me/4439380300?text=¡Hola!%20Confirmo%20mi%20asistencia." class="btn">Confirmar asistencia</a>
        </div>

    </div>

    <script>
        const btnAbrir = document.getElementById("btnAbrir");
        const pantallaInicio = document.getElementById("pantalla-inicio");
        const contenidoInvitacion = document.getElementById("contenido-invitacion");
        const audio = document.getElementById("musicaFondo");
        const btnMusica = document.getElementById("btnMusica");

        // Al presionar el botón de abrir
        btnAbrir.addEventListener("click", function() {
            // Oculta la pantalla de inicio
            pantallaInicio.style.display = "none";
            // Muestra la invitación
            contenidoInvitacion.style.display = "block";
            // Reproduce la música
            audio.play().catch(error => console.log("Error al reproducir audio: ", error));
        });

        // Control del botón flotante de música (silenciar/activar)
        btnMusica.onclick = () => {
            if (audio.paused) {
                audio.play();
                btnMusica.innerText = "🔊";
            } else {
                audio.pause();
                btnMusica.innerText = "🔇";
            }
        };
    </script>
</body>
</html>
